<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mike Krilivsky — AI Revenue Operator</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1612;
  --cream:#f5ede0;
  --sand:#ede3d4;
  --terra:#c4603a;
  --muted:#7a6a58;
  --white:#fdfaf6;
}
body{background:var(--ink);color:var(--cream);font-family:'Lato',sans-serif;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:48px 28px;text-align:center;position:relative;overflow:hidden}

body::before{content:'';position:absolute;top:-120px;right:-120px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(196,96,58,.14) 0%,transparent 65%);pointer-events:none}
body::after{content:'';position:absolute;bottom:-100px;left:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(196,96,58,.08) 0%,transparent 65%);pointer-events:none}

.tag{font-size:11px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;color:var(--terra);margin-bottom:24px;animation:fadeUp .8s .1s ease both}

h1{font-family:'Playfair Display',serif;font-size:clamp(42px,10vw,86px);font-weight:400;line-height:1.0;letter-spacing:-.02em;color:var(--cream);margin-bottom:12px;animation:fadeUp .8s .2s ease both}

h1 em{font-style:italic;color:var(--terra)}

.sub{font-size:18px;font-weight:300;color:rgba(245,237,224,.55);max-width:400px;line-height:1.75;margin:0 auto 52px;animation:fadeUp .8s .32s ease both}

.rule{width:48px;height:1px;background:rgba(196,96,58,.4);margin:0 auto 28px;animation:fadeUp .8s .44s ease both}

.sig{font-size:11px;font-weight:700;letter-spacing:.24em;text-transform:uppercase;color:var(--terra);animation:fadeUp .8s .5s ease both}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
  <div class="tag">mikek.ai</div>
  <h1>AI Revenue<br><em>Operator.</em></h1>
  <p class="sub">Turning existing demand into revenue for physical businesses — starting with longevity clinics.</p>
  <div class="rule"></div>
  <div class="sig">Mike Krilivsky · 2026</div>
</body>
</html>
